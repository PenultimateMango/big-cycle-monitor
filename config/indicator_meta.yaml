# Natural-language labels, display suffixes, and plain-English definitions for the
# dashboard. Kept separate from thresholds.yaml so scoring rules stay clean.
# definition = what it measures + why Dalio thinks it matters.

top1_wealth_share:
  label: "Top 1% wealth share"
  suffix: "%"
  decimals: 0
  definition: "Share of national wealth held by the wealthiest 1%. Dalio treats a widening wealth gap as a primary driver of internal disorder — the resentment that pushes a society from Stage 4 excess toward Stage 5 conflict."
  source: "World Inequality Database (WID.world); Fed Distributional Financial Accounts"

income_gini:
  label: "Income inequality (Gini)"
  suffix: ""
  decimals: 1
  definition: "How unequally income is spread, from 0 (perfectly equal) to 1 (one person has it all). Complements the wealth gap; entrenched inequality erodes the shared prosperity that holds Stage 3 together."
  source: "U.S. Census Bureau (CPS/ACS); World Bank"

political_polarization:
  label: "Political polarization"
  suffix: ""
  definition: "How far apart the two parties sit ideologically, from congressional voting records, scaled 0–1. Dalio flags the loss of a workable middle as a hallmark of late-stage internal disorder."
  source: "Voteview DW-NOMINATE (voteview.com)"

institutional_trust:
  label: "Trust in government"
  suffix: "%"
  decimals: 0
  definition: "Share of the public that trusts the federal government to do what's right. Falling trust weakens a system's ability to make and enforce decisions — a defining symptom of Stage 5."
  source: "Pew Research Center; Gallup"

populist_vote_share:
  label: "Populist vote share"
  suffix: "%"
  definition: "Combined vote for populist candidates of the left and right. Dalio reads the simultaneous rise of populism on both extremes as the signature of a society splitting under strain."
  source: "Curated from national election results"

unrest_events:
  label: "Civil unrest intensity"
  suffix: " idx"
  definition: "Frequency and intensity of protests, riots, and political violence, scaled 0–100. The most direct real-time read on how close internal conflict is to boiling over."
  source: "GDELT Project (event tone); ACLED U.S. Crisis Monitor"

gov_debt_gdp:
  label: "Government debt / GDP"
  suffix: "%"
  decimals: 0
  definition: "Total public debt as a share of the economy. The headline gauge of how far the long-term debt cycle has run; high and rising levels mark its late, fragile phase."
  source: "FRED / U.S. Treasury (GFDEGDQ188S)"

total_nonfin_debt_gdp:
  label: "Total non-financial debt / GDP"
  suffix: "%"
  definition: "All public plus private non-financial debt relative to GDP. Captures economy-wide leverage, not just the government's — a fuller picture of systemic fragility."
  source: "Bank for International Settlements (BIS) credit statistics"

interest_pct_revenue:
  label: "Interest cost / revenue"
  suffix: "%"
  definition: "Share of federal revenue eaten by interest payments. Dalio's key late-stage tripwire: when debt service crowds out everything else, the squeeze becomes self-reinforcing."
  source: "U.S. Treasury Fiscal Data; FRED; CBO"

cb_balance_sheet_gdp:
  label: "Central bank balance sheet / GDP"
  suffix: "%"
  decimals: 0
  definition: "The Fed's holdings relative to the economy — a proxy for money printing. Sustained expansion signals the monetization phase, where the bank funds deficits directly."
  source: "Federal Reserve (FRED: WALCL) / BEA GDP"

policy_room:
  label: "Policy rate (room to cut)"
  suffix: "%"
  decimals: 1
  definition: "The nominal policy rate, standing in for how much conventional ammunition the central bank has left. Near-zero means no room, a late-cycle vulnerability; higher means more room to respond."
  source: "Federal Reserve (FRED: DFF)"

foreign_treasury_share:
  label: "Foreign-held debt share"
  suffix: "%"
  decimals: 0
  definition: "Share of publicly-held federal debt owned by foreign investors. A declining trend signals waning external confidence in the debt — an early warning on the road to reserve-status loss."
  source: "FRED: FDHBFIN / FYGFDPUN (foreign share of debt held by the public)"

reserve_currency_share:
  label: "Reserve currency share"
  suffix: "%"
  decimals: 0
  definition: "The dollar's share of global central-bank reserves. Reserve status is the debt cycle's ultimate backstop; its slow erosion is the deepest, slowest signal of decline."
  source: "IMF COFER (Currency Composition of Official FX Reserves)"

rival_power_gap:
  label: "Power gap vs. top rival"
  suffix: ""
  definition: "The leading power's overall strength minus its nearest challenger's, scaled 0–1. A narrowing gap is Dalio's core external-order risk — the classic setup for great-power conflict."
  source: "Derived power index; Dalio Great Powers Index"

military_balance:
  label: "Military spending balance"
  suffix: "%"
  decimals: 0
  definition: "The top rival's military spending as a share of the leader's. A rising ratio signals a shifting balance of hard power and a higher risk of confrontation."
  source: "SIPRI Military Expenditure Database (via World Bank)"

conflict_intensity:
  label: "Global conflict intensity"
  suffix: " idx"
  definition: "Real-time intensity of conflictual events worldwide, scaled 0–100. Dalio's global conflict gauge has sat near its highest levels since the World Wars."
  source: "GDELT Project; Dalio global conflict gauge"

five_wars_composite:
  label: "Five-front conflict ladder"
  suffix: ""
  definition: "Average intensity across Dalio's five escalation fronts — trade, technology, capital, geopolitical, and military. Conflict climbs these rungs before it ever turns to shooting."
  source: "Derived: Global Trade Alert, export-control & OFAC data, ACLED"

bloc_alignment:
  label: "Bloc alignment"
  suffix: ""
  definition: "How sharply the world is splitting into rival alliances, scaled 0–1. Rising alignment into opposing blocs is a precondition for the systemic conflict that resets a world order."
  source: "Derived from GDELT alliance/influence signals"

media_trust:
  label: "Trust in mass media"
  suffix: "%"
  decimals: 0
  definition: "Share of Americans with a great deal or fair amount of trust in newspapers, TV, and radio to report the news fully, accurately, and fairly — Gallup's unchanged question since 1972 (72% then, 28% now). Dalio flags the loss of shared truth in public discourse as a hallmark of Stage 5: when large factions assign zero credibility to the information system, disputes stop being resolvable with facts."
  source: "Gallup, annual September poll (news.gallup.com/topic/media.aspx)"

trade_war:
  label: "· Trade war"
  suffix: ""
  definition: "Intensity of tariff, quota, and trade-restriction conflict between the leading power and its rival, 0–1. The first and mildest rung of Dalio's five-front escalation ladder."
  source: "Global Trade Alert (globaltradealert.org); judgment-scaled"

technology_war:
  label: "· Technology war"
  suffix: ""
  definition: "Intensity of the fight over technological supremacy — export controls, entity lists, chip and standards restrictions — 0–1. Dalio ranks tech dominance as the most decisive front short of shooting."
  source: "US BIS Entity List / export-control trackers; judgment-scaled"

capital_war:
  label: "· Capital war"
  suffix: ""
  definition: "Intensity of financial-front conflict — sanctions, asset freezes, delistings, payment-system exclusion — 0–1. The rung where money itself becomes the weapon."
  source: "OFAC sanctions programs (ofac.treasury.gov); judgment-scaled"

geopolitical_war:
  label: "· Geopolitical war"
  suffix: ""
  definition: "Intensity of influence competition — alliance-building, proxy pressure, territorial brinkmanship — 0–1. The rung just below direct confrontation."
  source: "GDELT alliance/influence signals; judgment-scaled"

military_war:
  label: "· Military war"
  suffix: ""
  definition: "Intensity of direct or proxy armed conflict between the powers, 0–1. The final rung; Dalio's history says the prior four fronts usually escalate before this one fires."
  source: "ACLED (acleddata.com); direct-vs-proxy judgment"
